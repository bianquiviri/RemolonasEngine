version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: remolonas-app
    container_name: remolonas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - remolonas
    ports:
      - "5173:5173" # Vite
    healthcheck:
      test: ["CMD", "php", "artisan", "api:health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: remolonas_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - remolonas
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: remolonas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: remolonas
      POSTGRES_USER: remolonas
      POSTGRES_PASSWORD: password
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - remolonas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remolonas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: remolonas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - remolonas

  mailpit:
    image: axllent/mailpit
    container_name: remolonas_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web Interface
    networks:
      - remolonas

networks:
  remolonas:
    driver: bridge

volumes:
  dbdata:
